# Netlify 配置文件 - Next.js 项目

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# 使用 Next.js 运行时
[[plugins]]
  package = "@netlify/plugin-nextjs"

# 环境变量（敏感信息请在 Netlify 控制台配置）
# [build.environment]
#   GLM_API_KEY = "your-api-key"

# 安全headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存静态资源
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
