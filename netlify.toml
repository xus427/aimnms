# Netlify 配置文件 - Next.js 项目

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# 使用 Next.js 运行时
[[plugins]]
  package = "@netlify/plugin-nextjs"

# 确保环境变量在所有上下文中可用
[functions]
  node_bundler = "esbuild"

# 安全headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存静态资源
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API路由配置 - 确保环境变量可用
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/nextjs_api_route/:splat"
  status = 200
  conditions = {Role = ["admin"]}
  force = false
