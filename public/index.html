<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI模拟面试助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#8b5cf6',
              foreground: '#ffffff',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-slate-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 min-h-screen">

  <!-- 行业选择页面 -->
  <div id="page-industry" class="page min-h-screen relative overflow-hidden">
    <!-- 背景装饰 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-80 h-80 bg-violet-200/30 dark:bg-violet-900/20 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-cyan-200/30 dark:bg-cyan-900/20 rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-amber-100/20 dark:bg-amber-900/10 rounded-full blur-3xl"></div>
    </div>

    <div class="container mx-auto px-4 py-12 max-w-7xl relative z-10">
      <!-- 标题 -->
      <div class="text-center mb-16">
        <div class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-violet-500/10 via-fuchsia-500/10 to-pink-500/10 border border-violet-200/50 text-sm font-medium mb-6">
          <svg class="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
          <span class="bg-gradient-to-r from-violet-600 to-fuchsia-600 bg-clip-text text-transparent">AI模拟面试助手</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold mb-4">
          <span class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-600 bg-clip-text text-transparent">选择你的目标行业</span>
        </h1>
        <p class="text-slate-500 text-lg max-w-xl mx-auto leading-relaxed">
          选择你想应聘的行业，系统将为你匹配对应行业的<span class="font-medium text-slate-900">资深HR面试官</span>
        </p>
      </div>

      <!-- 行业卡片 -->
      <div id="industry-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5 mb-8"></div>

      <!-- 底部提示 -->
      <div class="text-center">
        <p class="text-sm text-slate-500">💡 选择行业后，将进一步选择具体职位类别和岗位</p>
      </div>
    </div>
  </div>

  <!-- 职位类别选择页面 -->
  <div id="page-category" class="page hidden min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <div class="text-center mb-10">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-violet-100 text-violet-600 text-sm font-medium mb-4">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
          AI模拟面试助手
        </div>
        <h1 class="text-3xl md:text-4xl font-bold mb-3">选择职位类别</h1>
        <div class="flex items-center justify-center gap-2 text-slate-500">
          <span>当前行业：</span>
          <span id="category-industry-badge" class="px-3 py-1 rounded-full text-white text-sm font-medium"></span>
        </div>
      </div>
      <div id="category-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8"></div>
      <div class="flex justify-center gap-4">
        <button onclick="showPage('industry')" class="px-4 py-2 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 font-medium flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          返回选择行业
        </button>
      </div>
    </div>
  </div>

  <!-- 职位选择页面 -->
  <div id="page-position" class="page hidden min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <div class="text-center mb-10">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-violet-100 text-violet-600 text-sm font-medium mb-4">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
          AI模拟面试助手
        </div>
        <h1 class="text-3xl md:text-4xl font-bold mb-3">选择具体职位</h1>
        <div class="flex items-center justify-center gap-2 text-slate-500 flex-wrap">
          <span id="position-industry-badge" class="px-3 py-1 rounded-full text-white text-sm font-medium"></span>
          <span>·</span>
          <span id="position-category-name" class="font-medium text-violet-600"></span>
        </div>
      </div>
      <div id="position-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-8"></div>
      <div class="flex justify-center gap-4">
        <button onclick="showPage('category')" class="px-4 py-2 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 font-medium flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          返回选择类别
        </button>
        <button id="btn-next-experience" onclick="showPage('experience')" class="px-6 py-2 rounded-lg bg-violet-600 hover:bg-violet-700 text-white font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          下一步
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 经验等级选择页面 -->
  <div id="page-experience" class="page hidden min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <div class="text-center mb-10">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-violet-100 text-violet-600 text-sm font-medium mb-4">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
          AI模拟面试助手
        </div>
        <h1 class="text-3xl md:text-4xl font-bold mb-3">选择你的经验等级</h1>
        <div class="flex items-center justify-center gap-2 text-slate-500 flex-wrap">
          <span id="experience-industry-badge" class="px-3 py-1 rounded-full text-white text-sm font-medium"></span>
          <span>·</span>
          <span id="experience-category-name"></span>
          <span>·</span>
          <span id="experience-position-name" class="font-medium text-violet-600"></span>
        </div>
      </div>
      <div id="experience-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8"></div>
      <div class="flex justify-center gap-4">
        <button onclick="showPage('position')" class="px-4 py-2 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 font-medium flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          返回选择职位
        </button>
        <button id="btn-start-interview" onclick="startInterview()" class="px-6 py-2 rounded-lg bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:opacity-90 text-white font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
          开始模拟面试
        </button>
      </div>
    </div>
  </div>

  <!-- 面试页面 -->
  <div id="page-interview" class="page hidden min-h-screen flex flex-col">
    <!-- Header -->
    <div class="border-b bg-white/80 backdrop-blur-sm sticky top-0 z-10">
      <div class="container mx-auto px-4 py-3 max-w-4xl">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="interview-icon" class="p-2.5 rounded-xl shadow-md"></div>
            <div>
              <h2 id="interview-position" class="font-semibold"></h2>
              <div class="flex items-center gap-2 text-sm text-slate-500">
                <span id="interview-experience" class="px-2 py-0.5 rounded bg-slate-100 text-xs"></span>
                <span class="hidden sm:inline">· <span id="interview-industry"></span></span>
              </div>
            </div>
          </div>
          <button onclick="restartInterview()" class="px-3 py-1.5 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 text-sm font-medium flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            重新开始
          </button>
        </div>
      </div>
    </div>

    <!-- 聊天区域 -->
    <div class="flex-1 overflow-hidden">
      <div id="chat-container" class="container mx-auto px-4 py-6 max-w-4xl h-[calc(100vh-180px)] overflow-y-auto scrollbar-hide">
        <div id="chat-messages" class="space-y-4"></div>
        <div id="chat-loading" class="hidden flex gap-3 mt-4">
          <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          </div>
          <div class="bg-white border shadow-sm rounded-2xl px-4 py-3">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 animate-spin text-violet-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              <span class="text-sm text-slate-500">正在思考...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="border-t bg-white/80 backdrop-blur-sm">
      <div class="container mx-auto px-4 py-4 max-w-4xl">
        <div id="input-area" class="flex gap-3">
          <textarea id="user-input" placeholder="输入你的回答..." class="flex-1 min-h-[44px] max-h-32 p-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 outline-none resize-none" rows="1"></textarea>
          <button onclick="sendMessage()" id="btn-send" class="h-11 px-4 rounded-xl bg-violet-600 hover:bg-violet-700 text-white font-medium flex items-center justify-center">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          </button>
        </div>
        <div id="ended-area" class="hidden text-center py-4">
          <p class="text-slate-500 mb-4">🎉 面试已结束，祝你求职顺利！</p>
          <button onclick="restartInterview()" class="px-6 py-2 rounded-lg bg-violet-600 hover:bg-violet-700 text-white font-medium flex items-center gap-2 mx-auto">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            开始新一轮面试
          </button>
        </div>
      </div>
    </div>
  </div>

        description: "快消零售连锁品牌，覆盖门店运营、电商渠道、供应链全业态岗位",
        gradient: "from-rose-500 via-pink-500 to-red-500",
        lightGradient: "from-rose-100 to-red-100",
        iconBg: "bg-gradient-to-br from-rose-500 to-red-500",
        stats: "21个热门职位",
        highlight: "品牌 · 电商 · 门店 · 供应链",
        categories: [
          { id: "retail_hq", name: "总部职能类", positions: ["品牌经理", "市场推广", "产品经理（快消品）", "电商运营", "内容运营", "直播运营", "私域运营", "数据分析", "财务", "法务", "IT"] },
          { id: "retail_sales", name: "销售与零售运营类", positions: ["区域经理", "城市经理", "门店店长/店经理", "零售督导", "渠道经理", "KA经理", "销售代表", "导购/店员"] },
          { id: "retail_supply", name: "供应链与商品类", positions: ["采购经理", "供应链计划", "物流经理", "仓储主管", "商品陈列师"] },
          { id: "retail_support", name: "支持类", positions: ["培训专员/培训师", "视觉陈列", "客服经理"] }
        ]
      },
      {
        id: "consulting",
        name: "咨询/专业服务",
        shortName: "咨询专业服务",
        icon: `<svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`,
        description: "四大、律所、管理咨询、猎头，聚焦专业服务与知识型岗位",
        gradient: "from-sky-500 via-blue-500 to-indigo-500",
        lightGradient: "from-sky-100 to-indigo-100",
        iconBg: "bg-gradient-to-br from-sky-500 to-indigo-500",
        stats: "16个热门职位",
        highlight: "咨询 · 审计 · 法律 · 研究",
        categories: [
          { id: "cons_pro", name: "专业服务类", positions: ["咨询顾问", "高级顾问/经理", "分析师", "审计员/审计经理", "税务专员/经理", "律师/律师助理", "法务顾问"] },
          { id: "cons_bd", name: "业务拓展类", positions: ["客户经理", "商务拓展（BD）", "大客户总监", "投标专员"] },
          { id: "cons_research", name: "研究与支持类", positions: ["行业研究员", "数据分析师", "知识管理专员", "市场调研员"] },
          { id: "cons_func", name: "内部职能类", positions: ["财务", "IT支持", "人力资源", "行政", "市场部"] }
        ]
      },
      {
        id: "education",
        name: "教育/培训行业",
        shortName: "教育培训",
        icon: `<svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>`,
        description: "K12教育、高等教育、职业培训、在线教育，涵盖教学教研与管理运营岗位",
        gradient: "from-green-500 via-lime-500 to-emerald-500",
        lightGradient: "from-green-100 to-emerald-100",
        iconBg: "bg-gradient-to-br from-green-500 to-emerald-500",
        stats: "24个热门职位",
        highlight: "教学 · 教研 · 运营 · 管理",
        categories: [
          { id: "edu_teacher", name: "教学类", positions: ["学科教师（语数英理化生）", "幼教老师", "小学教师", "初高中教师", "国际学校教师", "特教老师", "艺术教师（音乐/美术/舞蹈）", "体育教练"] },
          { id: "edu_research", name: "教研与课程类", positions: ["教研员", "课程设计师", "教学研究员", "教材编辑", "教辅产品经理", "试题研究员"] },
          { id: "edu_training", name: "培训与企业教育类", positions: ["企业培训师", "职业培训讲师", "技术培训师", "内训师", "课程顾问", "学习发展经理"] },
          { id: "edu_online", name: "在线教育类", positions: ["在线讲师/主播", "直播运营", "课程运营", "用户运营", "社群运营", "教务班主任", "学习顾问"] },
          { id: "edu_manage", name: "管理与运营类", positions: ["校长/园长", "教务主任", "年级组长", "招生主管", "市场主管", "校区运营经理", "班主任"] },
          { id: "edu_func", name: "职能支持类", positions: ["教育产品经理", "技术开发", "数据分析", "人力资源", "财务", "行政", "品牌公关"] }
        ]
      }
    ];

    // 经验等级
    const experienceLevels = [
      { id: "beginner", name: "应届生/实习", description: "即将毕业或刚入行", icon: "🎓" },
      { id: "junior", name: "1-3年经验", description: "有一定工作经验", icon: "🚀" },
      { id: "mid", name: "3-5年经验", description: "资深从业者", icon: "💪" },
      { id: "senior", name: "5-10年经验", description: "专家级别", icon: "⭐" },
      { id: "expert", name: "10年以上经验", description: "高管级别", icon: "👑" }
    ];

    // HR面试官配置
    const hrConfigs = {
      tech: { name: "互联网/科技行业", hrType: "HRBP", focus: "业务理解、数据分析、项目落地能力" },
      manufacturing: { name: "制造业/实体工业", hrType: "综合人事经理", focus: "法规知识、实操经验、细节管理" },
      finance: { name: "金融行业", hrType: "HR总监", focus: "合规意识、风险控制、专业判断" },
      retail: { name: "消费品/零售/连锁", hrType: "区域HR总监", focus: "执行力、抗压能力、多任务处理" },
      consulting: { name: "咨询/专业服务", hrType: "HR合伙人", focus: "专业深度、思维逻辑、客户意识" },
      education: { name: "教育/培训行业", hrType: "人事主任", focus: "教学能力、沟通表达、教育情怀" }
    };

    // 状态变量
    let selectedIndustry = null;
    let selectedCategory = null;
    let selectedPosition = null;
    let selectedExperience = null;
    let sessionId = null;
    let messages = [];
    let isLoading = false;

    // 初始化页面
    function init() {
      renderIndustryCards();
      renderExperienceCards();
      setupInputListener();
    }

    // 渲染行业卡片
    function renderIndustryCards() {
      const container = document.getElementById('industry-cards');
      container.innerHTML = industries.map(industry => `
        <div class="group relative cursor-pointer" onclick="selectIndustry('${industry.id}')">
          <div class="absolute inset-0 rounded-3xl transition-all duration-500 bg-gradient-to-r ${industry.gradient} opacity-0 blur-xl group-hover:opacity-30"></div>
          <div class="relative h-full bg-white dark:bg-slate-900/80 rounded-3xl p-6 border-2 border-slate-200 dark:border-slate-800 shadow-lg transition-all duration-300 group-hover:border-transparent group-hover:shadow-2xl group-hover:scale-[1.02] group-hover:-translate-y-1">
            <div class="absolute top-0 left-0 right-0 h-1.5 rounded-t-3xl bg-gradient-to-r ${industry.gradient} opacity-60 group-hover:opacity-100"></div>
            <div class="inline-flex p-4 rounded-2xl mb-5 ${industry.iconBg} shadow-lg transition-all duration-300 group-hover:scale-110 group-hover:shadow-xl">
              ${industry.icon}
            </div>
            <h3 class="text-lg font-bold mb-2 text-slate-900 dark:text-white transition-colors duration-300 group-hover:bg-gradient-to-r group-hover:${industry.gradient} group-hover:bg-clip-text group-hover:text-transparent">
              ${industry.shortName}
            </h3>
            <p class="text-sm font-medium bg-gradient-to-r ${industry.gradient} bg-clip-text text-transparent mb-3">
              ${industry.stats}
            </p>
            <p class="text-sm text-slate-500 leading-relaxed mb-4 line-clamp-2">
              ${industry.description}
            </p>
            <div class="flex flex-wrap gap-1.5 mb-4">
              ${industry.highlight.split('·').map(tag => `
                <span class="text-xs px-2.5 py-1 rounded-full bg-gradient-to-r ${industry.lightGradient} text-slate-600">
                  ${tag.trim()}
                </span>
              `).join('')}
            </div>
            <div class="flex items-center justify-center gap-2 py-2.5 rounded-xl bg-gradient-to-r ${industry.gradient} text-white text-sm font-medium opacity-90 group-hover:opacity-100">
              开始选择
              <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 渲染经验等级卡片
    function renderExperienceCards() {
      const container = document.getElementById('experience-cards');
      container.innerHTML = experienceLevels.map(level => `
        <div class="experience-card cursor-pointer rounded-xl border-2 border-slate-200 bg-white p-5 text-center shadow-sm transition-all duration-200 hover:shadow-md hover:border-slate-300"
             onclick="selectExperience('${level.id}')">
          <div class="text-3xl mb-3">${level.icon}</div>
          <h3 class="font-semibold mb-2">${level.name}</h3>
          <p class="text-xs text-slate-500 leading-relaxed">${level.description}</p>
        </div>
      `).join('');
    }

    // 设置输入监听
    function setupInputListener() {
      const input = document.getElementById('user-input');
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    // 显示页面
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');
    }

    // 选择行业
    function selectIndustry(industryId) {
      selectedIndustry = industries.find(i => i.id === industryId);
      selectedCategory = null;
      selectedPosition = null;
      
      renderCategoryCards();
      
      document.getElementById('category-industry-badge').className = `px-3 py-1 rounded-full text-white text-sm font-medium bg-gradient-to-r ${selectedIndustry.gradient}`;
      document.getElementById('category-industry-badge').textContent = selectedIndustry.name;
      
      showPage('category');
    }

    // 渲染职位类别卡片
    function renderCategoryCards() {
      const container = document.getElementById('category-cards');
      container.innerHTML = selectedIndustry.categories.map(category => `
        <div class="cursor-pointer rounded-xl border-2 border-slate-200 bg-white p-5 shadow-sm transition-all duration-200 hover:shadow-md hover:border-slate-300 group"
             onclick="selectCategory('${category.id}')">
          <div class="flex items-center gap-3 mb-3">
            <div class="p-2.5 rounded-xl ${selectedIndustry.iconBg} shadow-md group-hover:scale-110 transition-transform">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            </div>
            <h3 class="font-semibold">${category.name}</h3>
          </div>
          <p class="text-sm text-slate-500 mb-3 line-clamp-2">${category.positions.slice(0, 2).join('、')}...</p>
          <div class="flex items-center justify-between">
            <span class="text-xs px-2 py-1 rounded-full border border-slate-200 text-slate-600">${category.positions.length}个职位</span>
            <svg class="w-4 h-4 text-slate-400 group-hover:text-violet-600 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </div>
        </div>
      `).join('');
    }

    // 选择职位类别
    function selectCategory(categoryId) {
      selectedCategory = selectedIndustry.categories.find(c => c.id === categoryId);
      selectedPosition = null;
      
      renderPositionCards();
      
      document.getElementById('position-industry-badge').className = `px-3 py-1 rounded-full text-white text-sm font-medium bg-gradient-to-r ${selectedIndustry.gradient}`;
      document.getElementById('position-industry-badge').textContent = selectedIndustry.shortName;
      document.getElementById('position-category-name').textContent = selectedCategory.name;
      
      document.getElementById('btn-next-experience').disabled = true;
      showPage('position');
    }

    // 渲染职位卡片
    function renderPositionCards() {
      const container = document.getElementById('position-cards');
      container.innerHTML = selectedCategory.positions.map((position, index) => `
        <div class="position-card cursor-pointer rounded-xl border-2 border-slate-200 bg-white p-4 shadow-sm transition-all duration-200 hover:shadow-md hover:border-slate-300 flex items-center justify-between"
             onclick="selectPositionByIndex(${index})">
          <span class="font-medium text-sm">${position}</span>
          <div class="w-2.5 h-2.5 rounded-full bg-gradient-to-r ${selectedIndustry.gradient} opacity-0 transition-opacity selected-dot"></div>
        </div>
      `).join('');
    }

    // 选择职位
    function selectPositionByIndex(index) {
      selectedPosition = selectedCategory.positions[index];
      
      document.querySelectorAll('.position-card').forEach((card, i) => {
        const dot = card.querySelector('.selected-dot');
        if (i === index) {
          card.classList.add('ring-2', 'ring-violet-500', 'ring-offset-2');
          dot.classList.remove('opacity-0');
          dot.classList.add('opacity-100');
        } else {
          card.classList.remove('ring-2', 'ring-violet-500', 'ring-offset-2');
          dot.classList.add('opacity-0');
          dot.classList.remove('opacity-100');
        }
      });
      
      document.getElementById('btn-next-experience').disabled = false;
      
      // 更新经验页面信息
      document.getElementById('experience-industry-badge').className = `px-3 py-1 rounded-full text-white text-sm font-medium bg-gradient-to-r ${selectedIndustry.gradient}`;
      document.getElementById('experience-industry-badge').textContent = selectedIndustry.shortName;
      document.getElementById('experience-category-name').textContent = selectedCategory.name;
      document.getElementById('experience-position-name').textContent = selectedPosition;
    }

    // 选择经验等级
    function selectExperience(expId) {
      selectedExperience = experienceLevels.find(e => e.id === expId);
      
      document.querySelectorAll('.experience-card').forEach((card, i) => {
        if (experienceLevels[i].id === expId) {
          card.classList.add('ring-2', 'ring-violet-500', 'ring-offset-2', 'shadow-lg');
        } else {
          card.classList.remove('ring-2', 'ring-violet-500', 'ring-offset-2', 'shadow-lg');
        }
      });
      
      document.getElementById('btn-start-interview').disabled = false;
    }

    // 开始面试
    async function startInterview() {
      if (!selectedIndustry || !selectedPosition || !selectedExperience) return;
      
      // 更新面试页面信息
      document.getElementById('interview-icon').className = `p-2.5 rounded-xl shadow-md ${selectedIndustry.iconBg}`;
      document.getElementById('interview-icon').innerHTML = selectedIndustry.icon;
      document.getElementById('interview-position').textContent = selectedPosition;
      document.getElementById('interview-experience').textContent = selectedExperience.name;
      document.getElementById('interview-industry').textContent = selectedIndustry.shortName;
      
      showPage('interview');
      messages = [];
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('input-area').classList.remove('hidden');
      document.getElementById('ended-area').classList.add('hidden');
      
      setLoading(true);
      
      try {
        const response = await fetch('/api/interview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'start',
            industry: selectedIndustry.id,
            position: selectedPosition,
            userExperience: selectedExperience.id
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          sessionId = data.sessionId;
          addMessage('assistant', data.message);
        } else {
          addMessage('assistant', `面试开始遇到问题：${data.error}`);
        }
      } catch (error) {
        addMessage('assistant', '网络连接出现问题，请检查网络后重试。');
      } finally {
        setLoading(false);
      }
    }

    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      
      if (!text || isLoading) return;
      
      input.value = '';
      addMessage('user', text);
      setLoading(true);
      
      try {
        const response = await fetch('/api/interview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'chat',
            industry: selectedIndustry.id,
            position: selectedPosition,
            userExperience: selectedExperience.id,
            message: text,
            sessionId: sessionId
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          addMessage('assistant', data.message);
          if (data.ended) {
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('ended-area').classList.remove('hidden');
          }
        }
      } catch (error) {
        addMessage('assistant', '网络连接出现问题，请重试。');
      } finally {
        setLoading(false);
      }
    }

    // 添加消息
    function addMessage(role, content) {
      const container = document.getElementById('chat-messages');
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      const isUser = role === 'user';
      const messageHtml = `
        <div class="flex gap-3 ${isUser ? 'flex-row-reverse' : ''}">
          <div class="w-8 h-8 rounded-full ${isUser ? 'bg-violet-600' : 'bg-slate-100'} flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 ${isUser ? 'text-white' : 'text-slate-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              ${isUser 
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>'
              }
            </svg>
          </div>
          <div class="max-w-[80%] rounded-2xl px-4 py-3 ${isUser ? 'bg-violet-600 text-white' : 'bg-white border shadow-sm'}">
            <div class="whitespace-pre-wrap text-sm leading-relaxed">${content}</div>
            <div class="text-xs mt-2 ${isUser ? 'text-violet-200' : 'text-slate-400'}">${timeStr}</div>
          </div>
        </div>
      `;
      
      container.insertAdjacentHTML('beforeend', messageHtml);
      container.scrollTop = container.scrollHeight;
    }

    // 设置加载状态
    function setLoading(loading) {
      isLoading = loading;
      const loadingEl = document.getElementById('chat-loading');
      const sendBtn = document.getElementById('btn-send');
      
      if (loading) {
        loadingEl.classList.remove('hidden');
        sendBtn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
      } else {
        loadingEl.classList.add('hidden');
        sendBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>';
      }
      
      // 滚动到底部
      const chatContainer = document.getElementById('chat-container');
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 重新开始
    function restartInterview() {
      selectedIndustry = null;
      selectedCategory = null;
      selectedPosition = null;
      selectedExperience = null;
      sessionId = null;
      messages = [];
      
      // 重置经验等级选择
      document.querySelectorAll('.experience-card').forEach(card => {
        card.classList.remove('ring-2', 'ring-violet-500', 'ring-offset-2', 'shadow-lg');
      });
      document.getElementById('btn-start-interview').disabled = true;
      
      showPage('industry');
    }

    // 初始化
    init();
  </script>
</body>
</html>
