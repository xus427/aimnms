# Netlify 配置文件 - 纯静态HTML + Functions 部署

[build]
  # 无需构建命令，直接发布public目录
  command = "echo 'No build needed'"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Functions配置
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 重定向规则 - API请求转发到Netlify Functions
[[redirects]]
  from = "/api/interview"
  to = "/.netlify/functions/interview"
  status = 200
  force = true

# 安全headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存静态资源
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
